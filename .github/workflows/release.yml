name: Package skills and release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip each skill folder
        run: |
          mkdir -p dist
          for category in "Academic Writing" "Data Analysis" "Evidence Insights" "Protocol Design" "Others"; do
            find "scientific-skills/$category" -mindepth 1 -maxdepth 1 -type d | while read dir; do
              name=$(basename "$dir")
              zip -r "dist/${name}.zip" "$dir"
            done
          done

      - name: Publish to latest release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          sleep 15
          gh release create latest dist/*.zip \
            --title "Skill Packages (auto-updated)" \
            --notes "Auto-generated on every push to main."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
