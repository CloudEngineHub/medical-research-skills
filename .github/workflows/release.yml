name: Package skills and release

on:
  push:
    branches: [main]
    paths:
      - 'scientific-skills/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release and detect changes
        id: setup
        run: |
          mkdir -p dist
          touch /tmp/deleted_skills.txt

          if gh release view latest >/dev/null 2>&1; then
            # Get last successfully packaged commit
            last_sha=$(git rev-parse refs/tags/last-packaged 2>/dev/null || echo "")

            if [ -n "$last_sha" ]; then
              echo "mode=incremental" >> $GITHUB_OUTPUT
              echo "Diffing from last-packaged ($last_sha) to HEAD..."

              git diff --name-only "$last_sha" HEAD \
                | grep "^scientific-skills/" \
                | while IFS= read -r file; do echo "$(echo "$file" | cut -d'/' -f1-3)"; done \
                | sort -u > /tmp/changed_skills.txt || true

              echo "Changed skill directories:"
              cat /tmp/changed_skills.txt
            else
              echo "mode=all" >> $GITHUB_OUTPUT
              echo "Release exists but no last-packaged tag — full repackage"
            fi
          else
            echo "mode=all" >> $GITHUB_OUTPUT
            echo "No release found — full package"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package all skills (first time)
        if: steps.setup.outputs.mode == 'all'
        run: |
          for category in "Academic Writing" "Data Analysis" "Evidence Insights" "Protocol Design" "Others"; do
            find "scientific-skills/$category" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r dir; do
              name=$(basename "$dir")
              zip -r "dist/${name}.zip" "$dir"
            done
          done
          echo "Total: $(ls dist/*.zip | wc -l) zips"

      - name: Package changed skills only (incremental)
        if: steps.setup.outputs.mode == 'incremental'
        run: |
          while IFS= read -r skill_dir; do
            [ -z "$skill_dir" ] && continue
            name=$(basename "$skill_dir")
            if [ -d "$skill_dir" ]; then
              echo "Zipping: $name"
              zip -r "dist/${name}.zip" "$skill_dir"
            else
              echo "Deleted: $name"
              echo "$name" >> /tmp/deleted_skills.txt
            fi
          done < /tmp/changed_skills.txt
          echo "Updated: $(ls dist/*.zip 2>/dev/null | wc -l) zip(s), Deleted: $(wc -l < /tmp/deleted_skills.txt)"

      - name: Create release (first time only)
        if: steps.setup.outputs.mode == 'all'
        run: |
          gh release create latest \
            --title "Skill Packages (auto-updated)" \
            --notes "Auto-generated on every push to main."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all zips in batches (first time)
        if: steps.setup.outputs.mode == 'all'
        run: |
          files=(dist/*.zip)
          total=${#files[@]}
          batch_size=20
          echo "Uploading $total files in batches of $batch_size..."
          for ((i=0; i<total; i+=batch_size)); do
            batch=("${files[@]:i:batch_size}")
            gh release upload latest "${batch[@]}" --clobber
            echo "Progress: $((i + ${#batch[@]})) / $total"
            [ $((i + batch_size)) -lt $total ] && sleep 15
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload changed zips (incremental)
        if: steps.setup.outputs.mode == 'incremental'
        run: |
          if ls dist/*.zip 2>/dev/null | grep -q .; then
            gh release upload latest dist/*.zip --clobber
            echo "Uploaded $(ls dist/*.zip | wc -l) zip(s)"
          else
            echo "No zips to upload"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove deleted skills from release (incremental)
        if: steps.setup.outputs.mode == 'incremental'
        run: |
          if [ -s /tmp/deleted_skills.txt ]; then
            while IFS= read -r name; do
              echo "Removing: ${name}.zip"
              gh release delete-asset latest "${name}.zip" --yes 2>/dev/null || true
            done < /tmp/deleted_skills.txt
          else
            echo "No skills deleted"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark last packaged commit
        run: |
          git tag -f last-packaged HEAD
          git push origin refs/tags/last-packaged -f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
